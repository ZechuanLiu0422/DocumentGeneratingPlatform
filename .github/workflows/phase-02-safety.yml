name: Phase 02 Safety

on:
  push:
    paths:
      - 'app/**'
      - 'lib/**'
      - 'tests/phase-02/**'
      - '.github/workflows/phase-02-safety.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'app/**'
      - 'lib/**'
      - 'tests/phase-02/**'
      - '.github/workflows/phase-02-safety.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  safe-01-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SAFE-01 contract suite
        run: npm run test:phase-02:contracts:ci
